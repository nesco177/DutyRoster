<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Duty Roaster</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 2em;
  background: #f4f6f8;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 12px;
  max-width: 600px;
  margin: auto;
}

h2 { text-align: center; }

label {
  font-weight: bold;
  margin-top: 10px;
  display:block;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: none;
  background: #007BFF;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.status {
  text-align: center;
  font-weight: bold;
}

.error {
  text-align: center;
  color: red;
}

#results {
  display: none;
  margin-top: 20px;
  display: grid;
  gap: 20px;
}

.result-box {
  display: none;
  padding: 18px;
  border-radius: 14px;
  border-left: 6px solid #007bff;
  background: #f9fbfd;
}

.result-box:nth-child(2){ background:#eaf4fc; border-left:#6f42c1 solid 6px;}
.result-box:nth-child(3){ background:#f0f8ff; border-left:#17a2b8 solid 6px;}
.result-box:nth-child(4){ background:#fef8f3; border-left:#ffc107 solid 6px;}
.result-box:nth-child(5){ background:#f4fdf6; border-left:#28a745 solid 6px;}

.result-label {
  font-weight:600;
  margin-bottom:10px;
}

.result-content {
  display:flex;
  flex-direction:column;
  gap:20px;
}

.result-name {
  padding:8px 14px;
  border-radius:20px;
  background:#f1f1f1;
  white-space:nowrap;
  box-shadow:0 3px 6px rgba(0,0,0,0.1);
  cursor:pointer;
  display:inline-block;
  width:fit-content;
}

.result-name:hover{
  background:#007BFF;
  color:white;
}

#col0 .result-name{ background:#f5fff6; }
#col1 .result-name{ background:#f6fbff; }
#col2 .result-name{ background:#fffcf7; }
#col3 .result-name{ background:#f5fff6; }
#col4 .result-name{ background:#fffef3; }

#col0 .result-name:hover{ background:#a5d6a7; color:#000; }
#col1 .result-name:hover{ background:#90caf9; color:#000; }
#col2 .result-name:hover{ background:#ffcc80; color:#000; }
#col3 .result-name:hover{ background:#a5d6a7; color:#000; }
#col4 .result-name:hover{ background:#fff59d; color:#000; }

</style>
</head>

<body>

<div class="container">

<h2>Duty Roster</h2>
<div class="status" id="status">Loading...</div>

<label>Select Date:</label>
<input type="date" id="date">

<label>Select Shift:</label>
<select id="shift">
<option value="">-- Select Shift --</option>
<option>Morning</option>
<option>Afternoon</option>
<option>Night</option>
</select>

<button onclick="fillJustNow()">Just Now</button>
<button onclick="searchShift()">Search</button>

<div id="error" class="error"></div>

<div id="results">

<div class="result-box" id="card0">
<div class="result-label">Complain Attendant:</div>
<div id="col0" class="result-content"></div>
</div>

<div class="result-box" id="card1">
<div class="result-label">Maintenance:</div>
<div id="col1" class="result-content"></div>
</div>

<div class="result-box" id="card2">
<div class="result-label">Complain:</div>
<div id="col2" class="result-content"></div>
</div>

<div class="result-box" id="card3">
<div class="result-label">Bindur Mor S/S:</div>
<div id="col3" class="result-content"></div>
</div>

<div class="result-box" id="card4">
<div class="result-label">City Central S/S:</div>
<div id="col4" class="result-content"></div>
</div>

</div>
</div>

<script>

let teamData = {};

const URL="https://raw.githubusercontent.com/nesco177/DutyRoster/main/Duty.xlsx";

const DATA_KEY = "duty_cache";
const TS_KEY = "duty_cache_time";

function hoursSince(ts){
  if(!ts) return 999;
  let diff = new Date() - new Date(ts);
  return diff / (1000 * 60 * 60);
}

async function loadData(){
  let cache = localStorage.getItem(DATA_KEY);
  let ts = localStorage.getItem(TS_KEY);

  if(cache && hoursSince(ts) < 24){
    teamData = JSON.parse(cache);
    document.getElementById("status").innerText = "✅ Ready for today";
    return;
  }

  try{
    const res = await fetch(URL,{cache:"no-store"});
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf,{type:"array"});

    let data={};
    wb.SheetNames.forEach(n=>{
      data[n]=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1});
    });

    teamData=data;

    localStorage.setItem(DATA_KEY,JSON.stringify(data));
    localStorage.setItem(TS_KEY,new Date().toISOString());

    document.getElementById("status").innerText="✅ Ready";

  }catch{
    document.getElementById("status").innerText="❌ Failed";
  }
}

loadData();

function fillJustNow(){
  let now=new Date();
  date.value=now.toISOString().split('T')[0];

  let h=now.getHours();
  shift.value=h<14?"Morning":h<22?"Afternoon":"Night";
}

function safeTel(p){
  if(p === undefined || p === null) return "0";
  let s = String(p).trim().replace(/[\s\-()]/g,"");
  if(s === "") return "0";
  return s;
}

function getMaintenanceTeam(date,shift){
  const base=new Date(2026,2,30);
  const d=Math.floor((date-base)/(1000*60*60*24));
  const c=((d%6)+6)%6;

  if(c<=2){
    if(shift==="Afternoon") return "Team1";
    if(shift==="Morning") return "Team2";
  }else{
    if(shift==="Morning") return "Team1";
    if(shift==="Afternoon") return "Team2";
  }
}

function getComplainTeam(day,shift){
  let b=Math.floor((day-1)%6/2);
  let map=[
    ["Morning","Afternoon","Night"],
    ["Night","Morning","Afternoon"],
    ["Afternoon","Night","Morning"]
  ];
  let t=["Team3","Team4","Team5"];

  for(let i=0;i<3;i++){
    if(map[b][i]===shift) return t[i];
  }
}

function getSSTeam(day,shift){
  let b=Math.floor((day-1)%6/2);
  let map=[
    ["Morning","Afternoon","Night"],
    ["Night","Morning","Afternoon"],
    ["Afternoon","Night","Morning"]
  ];
  let t=["Team6","Team7","Team8"];

  for(let i=0;i<3;i++){
    if(map[b][i]===shift) return t[i];
  }
}

function getDriver(date,shift){
  let prev=new Date(date);
  prev.setDate(prev.getDate()-1);

  let team="";
  if(shift==="Morning") team=getComplainTeam(prev.getDate(),"Night");
  if(shift==="Afternoon") team=getComplainTeam(date.getDate(),"Morning");

  return teamData[team]?.[0] || null;
}

function searchShift(){

  error.innerText="";
  results.style.display="none";

  ["col0","col1","col2","col3","col4"].forEach(id=>window[id].innerHTML="");
  ["card0","card1","card2","card3","card4"].forEach(id=>window[id].style.display="none");

  if(!date.value || !shift.value){
    error.innerText="Please select both date and shift.";
    return;
  }

  let d=new Date(date.value);

  let m=getMaintenanceTeam(d,shift.value);
  let c=getComplainTeam(d.getDate(),shift.value);
  let s=getSSTeam(d.getDate(),shift.value);

  if(teamData[m]){
    teamData[m].forEach(r=>{
      let name=r?.[0];
      let phone=safeTel(r?.[1]);

      if(name){
        col1.innerHTML += `<span class="result-name" onclick="location.href='tel:${phone}'">${name}</span>`;
        card1.style.display="block";
      }
    });
  }

  let driver=getDriver(d,shift.value);
  if(driver){
    col1.innerHTML+=`<span class="result-name" onclick="location.href='tel:${safeTel(driver[1])}'">${driver[0]}</span>`;
    card1.style.display="block";
  }

  if(teamData[c]){
    teamData[c].forEach(r=>{
      let name=r?.[0];
      let phone=safeTel(r?.[1]);

      if(name){
        col2.innerHTML += `<span class="result-name" onclick="location.href='tel:${phone}'">${name}</span>`;
        card2.style.display="block";
      }
    });
  }

  let ss=teamData[s];
  if(ss && ss.length>=3){

    col3.innerHTML+=`<span class="result-name" onclick="location.href='tel:${safeTel(ss[0][1])}'">${ss[0][0]}</span>`;
    col4.innerHTML+=`<span class="result-name" onclick="location.href='tel:${safeTel(ss[1][1])}'">${ss[1][0]}</span>`;
    col0.innerHTML+=`<span class="result-name" onclick="location.href='tel:${safeTel(ss[2][1])}'">${ss[2][0]}</span>`;

    ["card0","card3","card4"].forEach(id=>window[id].style.display="block");
  }

  results.style.display="grid";
}

</script>

</body>
</html>
